name: CI/CD - Lint -> Test -> Scan -> Deploy Dev -> Approve -> Deploy Prod

# Single-branch cascade (mirrors deploy_VPS.yml), adapted for a shell-less
# cPanel host: deploys go over FTPS and post-deploy artisan runs through the
# token-guarded public/deploy.php hook. See docs/DEPLOY-CPANEL.md.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: 'After dev, also deploy to production (requires approval)'
        type: boolean
        default: false

# No workflow-level concurrency: a run parked at the prod approval gate must not
# block new dev runs. Each deploy job serializes on its own environment instead.

permissions:
  contents: read

env:
  PHP_VERSION: '8.4'   # match the cPanel subdomain PHP (Laravel 12 supports 8.2-8.4)

jobs:
  # 1. Code style
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
      - uses: ramsey/composer-install@v3
      - name: Laravel Pint (style check)
        run: vendor/bin/pint --test

  # 2. Automated tests (in-memory sqlite, per phpunit.xml)
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_sqlite, sqlite3, gd, curl, fileinfo, intl, bcmath
          coverage: none
      - uses: ramsey/composer-install@v3
      - name: Prepare test env
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Run tests
        run: php artisan test

  # 3. Dependency security scan (blocking gate on production dependencies).
  # If a new advisory lands, this fails the pipeline: upgrade the package, or
  # if you must accept it, add its advisory ID to composer.json `config.audit.ignore`
  # with a written reason.
  security:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
      - uses: ramsey/composer-install@v3
      - name: composer audit
        run: composer audit --no-dev

  # 4. Build the production artifact once, promote the SAME bits dev -> prod.
  build:
    needs: [test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, gd, zip, curl, fileinfo, intl, bcmath
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          composer-options: "--no-dev --optimize-autoloader"
      - name: Create release archive
        # One zip, built outside the working tree. Uploaded as a single file
        # over FTPS and unzipped server-side by public/extract.php — far faster
        # than syncing thousands of vendor/ files individually.
        run: php .github/scripts/make-archive.php "$RUNNER_TEMP/app.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: ${{ runner.temp }}/app.zip
          retention-days: 5

  # 5. Deploy to Dev (dev.<domain>, HTTPS). Secrets/vars from the `dev` env.
  deploy_dev:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    # Serialize dev deploys; a newer push cancels an in-flight older one.
    concurrency:
      group: deploy-dev
      cancel-in-progress: true
    outputs:
      url: ${{ vars.APP_URL }}
    steps:
      - uses: actions/checkout@v4   # for make-env.sh + public/extract.php
      - uses: actions/download-artifact@v4
        with:
          name: app-build          # -> app.zip in the workspace
      - name: Generate .env
        env:
          APP_URL: ${{ vars.APP_URL }}
          APP_DEBUG: ${{ vars.APP_DEBUG }}
          APP_KEY: ${{ secrets.APP_KEY }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MAIL_HOST: ${{ vars.MAIL_HOST }}
          MAIL_PORT: ${{ vars.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM_ADDRESS: ${{ vars.MAIL_FROM_ADDRESS }}
        run: bash .github/scripts/make-env.sh > "$RUNNER_TEMP/app.env"
      - name: Upload over FTPS (env + bootstrap extractor + one archive)
        # Explicit FTPS (--ssl-reqd). The FTP account is scoped to the app dir,
        # so paths are relative to it: .env and app.zip sit at the app root
        # (above the public/ docroot); extract.php goes into public/.
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          up() { curl -sS --ssl-reqd --ftp-create-dirs -T "$1" "ftp://${FTP_HOST}/$2" --user "${FTP_USER}:${FTP_PASS}"; }
          up "$RUNNER_TEMP/app.env" ".env"
          up "public/.htaccess"     "public/.htaccess"
          up "public/extract.php"   "public/extract.php"
          up "app.zip"              "app.zip"
      - name: Extract on server, then migrate + cache + storage:link
        env:
          APP_URL: ${{ vars.APP_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          curl -fsS --retry 3 --retry-delay 10 --max-time 600 \
            -H "X-Deploy-Token: ${DEPLOY_TOKEN}" "${APP_URL}/extract.php"
          curl -fsS --retry 5 --retry-delay 15 --max-time 300 \
            -H "X-Deploy-Token: ${DEPLOY_TOKEN}" "${APP_URL}/deploy.php"

  # 6. Smoke test Dev
  test_dev:
    needs: deploy_dev
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for dev to come up
        run: |
          BASE="${{ needs.deploy_dev.outputs.url }}"
          for i in $(seq 1 12); do
            S=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE/en" || true)
            if [ "$S" = "200" ]; then echo "dev up after ~$((i*5))s"; exit 0; fi
            echo "attempt $i: got $S, retrying in 5s..."; sleep 5
          done
          echo "dev did not come up in time"; exit 1
      - name: Smoke test routes
        run: |
          BASE="${{ needs.deploy_dev.outputs.url }}"
          FAILED=0
          for path in / /en /en/about /en/services /en/contact /en/journal /ro /admin/login; do
            S=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --retry 3 --retry-delay 5 "$BASE$path")
            echo "$S  $path"
            case "$S" in 200|302) ;; *) echo "FAIL: $path returned $S"; FAILED=1 ;; esac
          done
          [ "$FAILED" = 0 ] || exit 1

  # 7. Deploy to Production. The `production` environment carries the required-
  #    reviewer rule -> this job is the manual approval gate before prod.
  deploy_prd:
    needs: test_dev
    # Prod never runs on a plain push — only when you manually dispatch with
    # deploy_prod=true. Keeps pushes from parking at the approval gate.
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_prod
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    outputs:
      url: ${{ vars.APP_URL }}
    steps:
      - uses: actions/checkout@v4   # for make-env.sh + public/extract.php
      - uses: actions/download-artifact@v4
        with:
          name: app-build          # -> app.zip in the workspace
      - name: Generate .env
        env:
          APP_URL: ${{ vars.APP_URL }}
          APP_DEBUG: ${{ vars.APP_DEBUG }}
          APP_KEY: ${{ secrets.APP_KEY }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MAIL_HOST: ${{ vars.MAIL_HOST }}
          MAIL_PORT: ${{ vars.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM_ADDRESS: ${{ vars.MAIL_FROM_ADDRESS }}
        run: bash .github/scripts/make-env.sh > "$RUNNER_TEMP/app.env"
      - name: Upload over FTPS (env + bootstrap extractor + one archive)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          up() { curl -sS --ssl-reqd --ftp-create-dirs -T "$1" "ftp://${FTP_HOST}/$2" --user "${FTP_USER}:${FTP_PASS}"; }
          up "$RUNNER_TEMP/app.env" ".env"
          up "public/.htaccess"     "public/.htaccess"
          up "public/extract.php"   "public/extract.php"
          up "app.zip"              "app.zip"
      - name: Extract on server, then migrate + cache + storage:link
        env:
          APP_URL: ${{ vars.APP_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          curl -fsS --retry 3 --retry-delay 10 --max-time 600 \
            -H "X-Deploy-Token: ${DEPLOY_TOKEN}" "${APP_URL}/extract.php"
          curl -fsS --retry 5 --retry-delay 15 --max-time 300 \
            -H "X-Deploy-Token: ${DEPLOY_TOKEN}" "${APP_URL}/deploy.php"

  # 8. Smoke test Production
  test_prd:
    needs: deploy_prd
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for prod to come up
        run: |
          BASE="${{ needs.deploy_prd.outputs.url }}"
          for i in $(seq 1 12); do
            S=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE/en" || true)
            if [ "$S" = "200" ]; then echo "prod up after ~$((i*5))s"; exit 0; fi
            echo "attempt $i: got $S, retrying in 5s..."; sleep 5
          done
          echo "prod did not come up in time"; exit 1
      - name: Smoke test routes
        run: |
          BASE="${{ needs.deploy_prd.outputs.url }}"
          FAILED=0
          for path in / /en /en/about /en/services /en/contact /en/journal /ro /admin/login; do
            S=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --retry 3 --retry-delay 5 "$BASE$path")
            echo "$S  $path"
            case "$S" in 200|302) ;; *) echo "FAIL: $path returned $S"; FAILED=1 ;; esac
          done
          [ "$FAILED" = 0 ] || exit 1
