<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AstroTherapia — Celestial Guidance</title>
  <meta name="description" content="Understanding the why behind your choices. Read the map you were born under and move with intention.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <section class="stage">
    <!-- cosmos background -->
    <div class="bg-base"></div>
    <div class="bg-layer" data-depth="0.35"><div class="stars stars1"></div></div>
    <div class="bg-layer" data-depth="0.7"><div class="stars stars2"></div></div>
    <div class="nebula"></div>
    <div class="twinkle" data-depth="1.1"></div>

    <!-- solar system -->
    <div class="solar-wrap" data-parallax="solar">
      <div class="plane">
        <div class="orbit orbit-1"><div class="anchor"><div class="planet planet-mercury"></div></div></div>
        <div class="orbit orbit-2"><div class="anchor"><div class="planet planet-venus"></div></div></div>
        <div class="orbit orbit-3"><div class="anchor"><div class="planet planet-earth"></div></div></div>
        <div class="orbit orbit-4"><div class="anchor"><div class="planet planet-mars"></div></div></div>
        <div class="orbit orbit-5"><div class="anchor"><div class="planet planet-saturn">
          <span class="saturn-ring"></span><span class="saturn-body"></span>
        </div></div></div>
      </div>
      <div class="sun"></div>
    </div>

    <div class="vignette"></div>

    <!-- chrome -->
    <header class="nav">
      <a href="#" class="brand">AstroTherapia</a>
      <nav class="nav-links">
        <a href="#" class="is-active">Home</a>
        <a href="#">About</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
      </nav>
      <a href="#" class="cta">&#10022; Your Chart</a>
    </header>

    <main class="hero">
      <p class="eyebrow"><span class="rule"></span>Celestial Guidance<span class="rule"></span></p>
      <h1 class="title">Understanding the <em>Why</em><br>Behind Your Choices</h1>
      <p class="lede">When the planets align, so do the patterns within you. Read the map you were born under and move with intention.</p>
      <div class="actions">
        <a href="#" class="btn btn-primary">Explore Your Chart</a>
        <a href="#" class="btn btn-ghost">Read the Journal &rarr;</a>
      </div>
    </main>

    <div class="scroll-cue">Scroll<span class="arrow">&darr;</span></div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
